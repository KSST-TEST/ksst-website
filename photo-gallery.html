<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KSST – Photo Gallery</title>
    <link rel="stylesheet" href="style.css?v=202604064">
    <style>
        /* Left Navigation */
        .gallery-container {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .gallery-nav {
            width: 240px;
            background: #f5f5f5;
            border-radius: 8px;
            padding: 20px;
            height: fit-content;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .gallery-nav-title {
            font-weight: bold;
            color: #1F4E78;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .gallery-nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .gallery-nav-link {
            padding: 12px 14px;
            margin-bottom: 10px;
            background: white;
            border-left: 4px solid transparent;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s;
            font-size: 15px;
            color: #333;
            display: block;
            line-height: 1.4;
            word-wrap: break-word;
            font-weight: 500;
        }

        .gallery-nav-link:hover {
            background: #e8e8e8;
            border-left-color: #e67e22;
            transform: translateX(4px);
        }

        .gallery-nav-link.active {
            background: #e67e22;
            color: white;
            border-left-color: #d45a0a;
            font-weight: bold;
            box-shadow: 0 2px 6px rgba(230, 126, 34, 0.3);
        }

        .gallery-main {
            flex: 1;
            min-width: 0;
        }

        .gallery-section {
            max-width: 100%;
            margin: 0;
            padding: 0;
        }

        @media (max-width: 768px) {
            .gallery-container {
                flex-direction: column;
                gap: 15px;
            }

            .gallery-nav {
                width: 100%;
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding: 15px;
                height: auto;
            }

            .gallery-nav-links {
                display: flex;
                gap: 10px;
                overflow-x: auto;
                padding-bottom: 10px;
            }

            .gallery-nav-link {
                white-space: nowrap;
                flex-shrink: 0;
                margin-bottom: 0;
            }
        }


        .gallery-title {
            text-align: center;
            font-size: 28px;
            font-weight: bold;
            color: #1F4E78;
            margin-bottom: 30px;
            font-family: Georgia, serif;
        }

        /* Carousel Container */
        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        .carousel-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 66.67%;
            background: #000;
            overflow: hidden;
        }

        .carousel-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
        }

        .carousel-slide.active {
            opacity: 1;
            z-index: 1;
        }

        .carousel-slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .carousel-slide video {
            width: 100% !important;
            height: 100% !important;
            object-fit: contain !important;
            display: block;
            background: #000;
        }

        /* Navigation Arrows */
        .carousel-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            border: none;
            padding: 15px 18px;
            cursor: pointer;
            font-size: 24px;
            transition: background 0.3s;
            z-index: 10;
            border-radius: 4px;
        }

        .carousel-nav:hover {
            background: rgba(0, 0, 0, 0.8);
        }

        .carousel-prev {
            left: 10px;
        }

        .carousel-next {
            right: 10px;
        }

        /* Dots/Indicators */
        .carousel-dots {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 10;
        }

        .carousel-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid white;
        }

        .carousel-dot.active {
            background: #e67e22;
            width: 16px;
            height: 16px;
            margin: -2px;
        }

        /* Photo Counter */
        .photo-counter {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-family: Calibri, sans-serif;
            z-index: 10;
        }

        /* Photo Info */
        .photo-info {
            padding: 20px;
            text-align: center;
            background: #f9f9f9;
            border-top: 2px solid #e67e22;
        }

        .photo-title {
            font-size: 18px;
            font-weight: bold;
            color: #1F4E78;
            margin: 0 0 8px 0;
            font-family: Georgia, serif;
        }

        .photo-description {
            font-size: 14px;
            color: #666;
            margin: 0;
            min-height: 0;
        }

        .photo-description:empty {
            display: none;
        }

        /* Gallery Grid Below (optional) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
            margin-top: 40px;
        }

        .gallery-thumb {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            aspect-ratio: 3/2;
            background: #f0f0f0;
            border: 3px solid transparent;
        }

        .gallery-thumb:hover {
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(230, 126, 34, 0.4);
        }

        .gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .gallery-thumb.active {
            border-color: #e67e22;
            box-shadow: 0 0 0 3px rgba(230, 126, 34, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .gallery-section {
                padding: 0 15px;
            }

            .gallery-title {
                font-size: 24px;
                margin-bottom: 20px;
            }

            .carousel-nav {
                padding: 12px 14px;
                font-size: 20px;
            }

            .carousel-dots {
                bottom: 10px;
                gap: 6px;
            }

            .carousel-dot {
                width: 10px;
                height: 10px;
            }

            .carousel-dot.active {
                width: 14px;
                height: 14px;
                margin: -2px;
            }

            .photo-counter {
                font-size: 12px;
                padding: 6px 10px;
            }

            .photo-info {
                padding: 15px;
            }

            .photo-title {
                font-size: 16px;
            }

            .photo-description {
                font-size: 13px;
            }

            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 10px;
                margin-top: 30px;
            }
        }

        @media (max-width: 600px) {
            .gallery-title {
                font-size: 20px;
                margin-bottom: 15px;
            }

            .carousel-nav {
                padding: 10px 12px;
                font-size: 18px;
            }

            .photo-counter {
                font-size: 11px;
                padding: 5px 8px;
                top: 10px;
                right: 10px;
            }

            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state p {
            font-size: 16px;
            margin: 10px 0;
        }
    </style>
</head>

<body>

<!-- HEADER -->
<header class="header">
    <img src="images/ksst-logo.jpeg" class="ksst-logo">

    <div class="header-text">
        <h1 class="site-title">Kovai Swamināma Smarana Trust</h1>
        <div class="tagline">Photo Gallery</div>
    </div>

    <div class="om-container">
        <img src="images/om.png" class="om-image">
        <a href="index.html" class="om-home-button">🏠</a>
    </div>
</header>

<!-- GALLERY SECTION -->
<div class="gallery-container">
    <!-- Left Navigation -->
    <nav class="gallery-nav">
        <div class="gallery-nav-title">Events</div>
        <ul class="gallery-nav-links" id="eventNav"></ul>
    </nav>

    <!-- Main Gallery -->
    <section class="gallery-main">
        <div class="gallery-section">
            <h2 class="gallery-title" id="galleryTitle">VSN Samarpan</h2>

            <!-- Carousel -->
            <div class="carousel-container">
                <div class="carousel-wrapper" id="carouselWrapper">
                    <!-- Slides will be inserted here by JavaScript -->
                </div>

                <!-- Navigation Arrows -->
                <button class="carousel-nav carousel-prev" onclick="previousSlide()">❮</button>
                <button class="carousel-nav carousel-next" onclick="nextSlide()">❯</button>

                <!-- Photo Counter -->
                <div class="photo-counter">
                    <span id="currentSlide">1</span> / <span id="totalSlides">0</span>
                </div>

                <!-- Dots/Indicators -->
                <div class="carousel-dots" id="dotsContainer"></div>
            </div>

            <!-- Photo Info -->
            <div class="photo-info">
                <h3 class="photo-title" id="photoTitle">Event Title</h3>
                <p class="photo-description" id="photoDescription">Photo description goes here</p>
            </div>

            <!-- Thumbnail Grid -->
            <div class="gallery-grid" id="thumbnailGrid"></div>
        </div>
    </section>
</div>

<!-- FOOTER -->
<footer class="footer">
    © Kovai Swamināma Smarana Trust – Celebrating Timeless Dharma
</footer>

<script>
    // Events Data - Multiple events with their photos
    const events = [
        {
            id: 'vsn-samarpan',
            title: 'Śrī Viṣṇu Sahasranāma Samarpan @ Ulagalantha Perumal Temple',
            description: 'Samarpan on Apr 5th, 2026',
            photos: [
                {
                    url: 'images/VSN Parayanam Image-01.jpeg',
                    title: 'Event Photo',
                    description: ''
                },
                {
                    url: 'images/VSN Parayanam Image-02.jpeg',
                    title: 'Event Photo',
                    description: ''
                },
                {
                    url: 'images/VSN Parayanam Image-03.jpeg',
                    title: 'Event Photo',
                    description: ''
                },
                {
                    url: 'images/VSN Parayanam Image-04.jpeg',
                    title: 'Event Photo',
                    description: ''
                },
                {
                    url: 'images/VSN Parayanam Image-05.jpeg',
                    title: 'Event Photo',
                    description: ''
                },
                {
                    url: 'images/VSN Parayanam Image-06.jpeg',
                    title: 'Event Photo',
                    description: ''
                },
                {
                    url: 'images/VSN Parayanam Image-07.jpeg',
                    title: 'Event Photo',
                    description: ''
                },
                {
                    url: 'images/WhatsApp Video 2026-04-05 at 2.19.31 AM.mp4',
                    title: 'Event Video',
                    description: '',
                    type: 'video'
                }
            ]
        }
        // Add more events here as needed
    ];

    let currentEventId = events[0].id;
    let currentSlideIndex = 0;

    // Initialize Gallery
    function initGallery() {
        initEventNav();
        loadEvent(currentEventId);
    }

    // Initialize Event Navigation
    function initEventNav() {
        const eventNav = document.getElementById('eventNav');
        eventNav.innerHTML = '';

        events.forEach(event => {
            const li = document.createElement('li');
            const link = document.createElement('a');
            link.className = 'gallery-nav-link' + (event.id === currentEventId ? ' active' : '');
            link.textContent = event.title;
            link.onclick = (e) => {
                e.preventDefault();
                loadEvent(event.id);
            };
            li.appendChild(link);
            eventNav.appendChild(li);
        });
    }

    // Load Event Photos
    function loadEvent(eventId) {
        const event = events.find(e => e.id === eventId);
        if (!event) return;

        currentEventId = eventId;
        currentSlideIndex = 0;

        // Update title
        document.getElementById('galleryTitle').textContent = event.title + ' - ' + event.description;

        // Update nav
        document.querySelectorAll('.gallery-nav-link').forEach(link => {
            link.classList.toggle('active', link.onclick.toString().includes(eventId));
        });

        // Clear and rebuild carousel
        loadPhotos();
    }

    // Load Photos for Current Event
    function loadPhotos() {
        const event = events.find(e => e.id === currentEventId);
        if (!event) return;

        const photos = event.photos;
        const carouselWrapper = document.getElementById('carouselWrapper');
        const dotsContainer = document.getElementById('dotsContainer');
        const thumbnailGrid = document.getElementById('thumbnailGrid');

        // Clear existing content
        carouselWrapper.innerHTML = '';
        dotsContainer.innerHTML = '';
        thumbnailGrid.innerHTML = '';

        // Create slides
        photos.forEach((photo, index) => {
            const slide = document.createElement('div');
            slide.className = 'carousel-slide' + (index === 0 ? ' active' : '');
            
            // Check if it's a video or image
            if (photo.type === 'video') {
                const video = document.createElement('video');
                video.style.width = '100%';
                video.style.height = '100%';
                video.style.objectFit = 'contain';
                video.controls = true;
                video.controlsList = 'nodownload';
                const source = document.createElement('source');
                source.src = photo.url;
                source.type = 'video/mp4';
                video.appendChild(source);
                slide.appendChild(video);
            } else {
                const img = document.createElement('img');
                img.src = photo.url;
                img.alt = photo.title;
                img.onerror = function() { this.src = 'images/lakshmi-narayan.jpg'; };
                slide.appendChild(img);
            }
            carouselWrapper.appendChild(slide);

            // Create dots
            const dot = document.createElement('button');
            dot.className = 'carousel-dot' + (index === 0 ? ' active' : '');
            dot.onclick = () => goToSlide(index);
            dotsContainer.appendChild(dot);

            // Create thumbnails
            const thumb = document.createElement('div');
            thumb.className = 'gallery-thumb' + (index === 0 ? ' active' : '');
            if (photo.type === 'video') {
                thumb.innerHTML = `<div style="width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; color: white; font-size: 24px;">▶</div>`;
            } else {
                thumb.innerHTML = `<img src="${photo.url}" alt="${photo.title}" onerror="this.src='images/lakshmi-narayan.jpg'">`;
            }
            thumb.onclick = () => goToSlide(index);
            thumbnailGrid.appendChild(thumb);
        });

        // Update counters
        document.getElementById('totalSlides').textContent = photos.length;
        updatePhotoInfo();
    }

    // Navigate to specific slide
    function goToSlide(index) {
        const event = events.find(e => e.id === currentEventId);
        if (!event || event.photos.length === 0) return;
        
        currentSlideIndex = (index + event.photos.length) % event.photos.length;
        updateSlides();
        updatePhotoInfo();
    }

    // Next slide
    function nextSlide() {
        const event = events.find(e => e.id === currentEventId);
        if (event) goToSlide(currentSlideIndex + 1);
    }

    // Previous slide
    function previousSlide() {
        const event = events.find(e => e.id === currentEventId);
        if (event) goToSlide(currentSlideIndex - 1);
    }

    // Update slide display
    function updateSlides() {
        const slides = document.querySelectorAll('.carousel-slide');
        const dots = document.querySelectorAll('.carousel-dot');
        const thumbs = document.querySelectorAll('.gallery-thumb');

        // Pause all videos
        document.querySelectorAll('video').forEach(video => video.pause());

        slides.forEach((slide, index) => {
            slide.classList.toggle('active', index === currentSlideIndex);
        });

        dots.forEach((dot, index) => {
            dot.classList.toggle('active', index === currentSlideIndex);
        });

        thumbs.forEach((thumb, index) => {
            thumb.classList.toggle('active', index === currentSlideIndex);
        });

        document.getElementById('currentSlide').textContent = currentSlideIndex + 1;
    }

    // Update photo info
    function updatePhotoInfo() {
        const event = events.find(e => e.id === currentEventId);
        if (!event) return;
        
        const photo = event.photos[currentSlideIndex];
        document.getElementById('photoTitle').textContent = photo.title;
        document.getElementById('photoDescription').textContent = photo.description || '';
    }

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') previousSlide();
        if (e.key === 'ArrowRight') nextSlide();
    });

    // Initialize on page load
    window.addEventListener('DOMContentLoaded', initGallery);
</script>

</body>
</html>
