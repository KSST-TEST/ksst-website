<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KSST Satsang Allocation</title>

<style>
    body {
        font-family: Calibri, sans-serif;
        background: #fff;
        margin: 0;
        padding: 0;
    }

    .header {
        text-align: center;
        padding: 20px 0;
        background: #FF9933;
        color: #000;
        font-size: 26px;
        font-weight: bold;
    }

    #toolTitle {
        text-align: center;
        font-size: 22px;
        margin-top: 10px;
        margin-bottom: 20px;
        color: #444;
        font-weight: bold;
    }

    .container {
        width: 95%;
        max-width: 1200px;
        margin: auto;
        display: flex;
        gap: 20px;
    }

    .left-panel, .right-panel {
        flex: 1;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
        margin-bottom: 5px;
    }

    input, textarea {
        width: 100%;
        padding: 10px;
        font-size: 15px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-family: Calibri;
    }

    textarea {
        height: 180px;
        resize: vertical;
    }

    #output {
        height: 450px;
        resize: vertical;
    }

    .btn-row {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 10px 18px;
        font-size: 15px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-weight: bold;
        font-family: Calibri;
    }

    .btn-allocate { background: #FF9933; }
    .btn-excel { background: #4CAF50; color: white; }
    .btn-pdf { background: #2196F3; color: white; }
    .btn-clear { background: #d9534f; color: white; }
</style>

<script>
/* STEP 1 — Dynamic Stothram Loader */
function loadStothram(stothramName, fullFn, fn108) {
    document.getElementById("toolTitle").innerText =
        stothramName + " – Allocation Tool";

    window.currentFullAllocation = fullFn;
    window.current108Allocation = fn108;
}

/* STEP 2 — Validation */
function validateInputs() {
    let names = document.getElementById("mainNames").value.trim();
    let date = document.getElementById("satsangDate").value.trim();
    let time = document.getElementById("satsangTime").value.trim();

    if (!names) {
        alert("Please enter devotee names.");
        return false;
    }
    if (!date) {
        alert("Please select Satsang Date.");
        return false;
    }
    if (!time) {
        alert("Please enter Satsang Time.");
        return false;
    }
    return true;
}

/* STEP 3 — Clear All */
function clearAll() {
    document.getElementById("batchNumber").value = "";
    document.getElementById("satsangDate").value = "";
    document.getElementById("satsangTime").value = "";
    document.getElementById("mainNames").value = "";
    document.getElementById("output").value = "";
}

/* STEP 4 — Allocate (Dynamic) */
function allocate(is108 = false) {
    if (!validateInputs()) return;

    if (is108) {
        window.current108Allocation();
    } else {
        window.currentFullAllocation();
    }
}


/* STEP 1 — Dynamic Stothram Loader */
    // ... your existing JS here ...

</script>
<script src="js/allocationEngine.js"></script>
<script src="js/vsn.js"></script>
<script src="js/lalithasn.js"></script>
<script src="js/lakshmisn.js"></script>

  
</head>

<body onload="loadVSN()">

<div class="header">Hari Om Namo Narayana</div>
<div id="toolTitle">Allocation Tool</div>

<div class="container">

    <!-- LEFT PANEL: INPUTS -->
    <div class="left-panel">

        <label>Batch Number</label>
        <input type="text" id="batchNumber">

        <label>Satsang Date</label>
        <input type="date" id="satsangDate">

        <label>Satsang Time (IST)</label>
        <input type="text" id="satsangTime" placeholder="e.g., 6:00 PM">

        <label>Devotee Names (one per line)</label>
        <textarea id="mainNames"></textarea>

        <div class="btn-row">
            <button class="btn btn-allocate" onclick="allocate(false)">Allocate Full VSN</button>
            <button class="btn btn-allocate" onclick="allocate(true)">Allocate 108 Slokas</button>
            <button class="btn btn-clear" onclick="clearAll()">Clear All</button>
        </div>

        <div class="btn-row">
            <button class="btn btn-excel" onclick="downloadExcel(false)">Download Excel (Full)</button>
            <button class="btn btn-excel" onclick="downloadExcel(true)">Download Excel (108)</button>

            <button class="btn btn-pdf" onclick="downloadPDF(false)">Download PDF (Full)</button>
            <button class="btn btn-pdf" onclick="downloadPDF(true)">Download PDF (108)</button>
        </div>

    </div>

    <!-- RIGHT PANEL: OUTPUT -->
    <div class="right-panel">
        <label>Output</label>
        <textarea id="output" readonly></textarea>
    </div>

</div>

</body>
</html>
