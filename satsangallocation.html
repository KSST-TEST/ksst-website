<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>KSST Satsang Allocation</title>

<link rel="stylesheet" href="style.css">

<style>
    /* Inline additions specific to this page */

    .allocation-container {
        width: 95%;
        max-width: 1300px;
        margin: auto;
        display: flex;
        gap: 25px;
        margin-top: 25px;
    }

    .left-panel, .right-panel {
        flex: 1;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
        margin-bottom: 6px;
        font-size: 16px;
        color: #4a2c2a;
    }

    textarea {
        width: 100%;
        height: 180px; /* SAME HEIGHT for both fields */
        resize: vertical;
        padding: 10px;
        font-size: 15px;
        border: 2px solid #e67e22;
        border-radius: 6px;
        background: #fffaf0;
        font-family: Calibri;
    }

    #output {
        height: 500px;
        resize: vertical;
    }

    .btn-row {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
    }

    .btn {
        padding: 12px 20px;
        font-size: 15px;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        font-family: Calibri;
        background: #e67e22;
        color: white;
    }

    .btn:hover {
        background: #d35400;
    }
</style>

<script src="js/allocationEngine.js"></script>
<script src="js/vsn.js"></script>
<script src="js/lalithasn.js"></script>
<script src="js/lakshmisn.js"></script>
<script src="js/excel.js"></script>
<script src="js/pdf.js"></script>
<script src="js/auth.js"></script>

<script>
/* ============================================================
   DYNAMIC STOTHRAM LOADER
   ============================================================ */
function loadStothram(stothramName, fullFn, slokaFn) {
    document.getElementById("toolTitle").innerText =
        stothramName + " – Allocation Tool";

    window.currentFullAllocation = fullFn;
    window.currentSlokaAllocation = slokaFn;
}

/* ============================================================
   VALIDATION
   ============================================================ */
function validateInputs() {
    let names = document.getElementById("mainNames").value.trim();
    let date = document.getElementById("satsangDate").value.trim();
    let time = document.getElementById("satsangTime").value.trim();

    if (!names) {
        alert("Please enter devotee names.");
        return false;
    }
    if (!date) {
        alert("Please select Satsang Date.");
        return false;
    }
    if (!time) {
        alert("Please enter Satsang Time.");
        return false;
    }
    return true;
}

/* ============================================================
   CLEAR ALL
   ============================================================ */
function clearAll() {
    document.getElementById("batchNumber").value = "";
    document.getElementById("satsangDate").value = "";
    document.getElementById("satsangTime").value = "";
    document.getElementById("mainNames").value = "";
    document.getElementById("historyInput").value = "";
    document.getElementById("output").value = "";
}

/* ============================================================
   ALLOCATE (Dynamic)
   ============================================================ */
function allocateFull() {
    if (!validateInputs()) return;
    window.currentFullAllocation();
}

function allocateSlokas() {
    if (!validateInputs()) return;
    window.currentSlokaAllocation();
}
</script>

</head>

<body onload="loadVSN()">

<div class="header">Hari Om Namo Narayana</div>
<div id="toolTitle" style="text-align:center; font-size:22px; margin-top:10px; font-weight:bold;">
    Allocation Tool
</div>

<div class="allocation-container">

    <!-- LEFT PANEL -->
    <div class="left-panel">

        <label>Batch Number</label>
        <input type="text" id="batchNumber" class="small-input">

        <label>Satsang Date</label>
        <input type="date" id="satsangDate" class="small-input">

        <label>Satsang Time (IST)</label>
        <input type="text" id="satsangTime" class="small-input" placeholder="e.g., 6:00 PM">

        <label>Enter Devotee Names (one name per line)</label>
        <textarea id="mainNames"></textarea>

        <label>Provide History Allocation(s) here (Optional)</label>
        <textarea id="historyInput"></textarea>

        <div class="btn-row">
            <button class="btn" onclick="allocateFull()">Allocate Full</button>
            <button class="btn" onclick="allocateSlokas()">Allocate Only Slokas</button>
            <button class="btn" onclick="clearAll()">Clear All</button>
        </div>

        <div class="btn-row">
            <button class="btn" onclick="downloadExcel(false)">Download Excel (Full)</button>
            <button class="btn" onclick="downloadExcel(true)">Download Excel (108)</button>

            <button class="btn" onclick="downloadPDF(false)">Download PDF (Full)</button>
            <button class="btn" onclick="downloadPDF(true)">Download PDF (108)</button>
        </div>

        <div id="reallocate-buttons" style="margin-top:15px;"></div>

    </div>

    <!-- RIGHT PANEL -->
    <div class="right-panel">
        <label>Here is your Allocation:</label>
        <textarea id="output" readonly></textarea>
    </div>

</div>

</body>
</html>
