<div class="tool-panel vsn-panel">

    <h2 class="tool-title">Śrī Viṣṇu Sahasranāma — Allocation Tool</h2>

    <!-- TOP ROW - SMALL INPUT FIELDS -->
    <div class="vsn-top-inputs">
        <div class="input-group">
            <label>Batch Name</label>
            <input type="text" id="vsn-batchNumber" class="vsn-small-input" placeholder="">
        </div>
        <div class="input-group">
            <label>Satsang No#</label>
            <input type="text" id="vsn-satsangNo" class="vsn-small-input" placeholder="1">
        </div>
        <div class="input-group">
            <label>Satsang Date</label>
            <input type="date" id="vsn-satsangDate" class="vsn-small-input">
        </div>
        <div class="input-group">
            <label>Satsang Time (IST)</label>
            <input type="time" id="vsn-satsangTime" class="vsn-small-input" placeholder="e.g., 6:00 PM">
        </div>
    </div>

    <!-- MAIN CONTENT - TWO COLUMNS -->
    <div class="vsn-main-container">

        <!-- LEFT COLUMN -->
        <div class="vsn-left-column">

            <!-- DEVOTEE NAMES INPUT -->
            <div class="vsn-input-section">
                <label class="vsn-section-title">Enter Devotee Names (one name per line)</label>
                <p style="font-size: 14px; color: #0066cc; margin: 2px 0; font-style: italic; font-weight: bold;">Please enter names only. Do not include serial numbers. Do not add Duplicate Names.</p>
                <textarea id="vsn-namesInput" class="vsn-textarea" rows="10" placeholder="Enter one name per line"></textarea>
            </div>

            <!-- HISTORY INPUT -->
            <div class="vsn-input-section">
                <label class="vsn-section-title">Provide History Allocation(s) here (Optional)</label>
                <p style="font-size: 12px; color: #666; margin: 5px 0;">
                    📝 Paste previous allocations or upload file (any text format, Excel, or CSV)
                </p>
                <textarea id="vsn-historyInput" class="vsn-textarea" rows="6" placeholder="Optional: Paste previous allocations here (any format supported)&#10;Or use Choose File to upload a history file."></textarea>
                
                <div class="vsn-file-row">
                    <button class="vsn-btn-file" onclick="document.getElementById('vsn-fileInput').click()">Choose File</button>
                    <span id="vsn-fileName" class="vsn-file-name">No file chosen</span>
                </div>
                <input type="file" id="vsn-fileInput" style="display:none;" accept=".txt,.csv,.xlsx" onchange="handleFileUpload(event)">

                <button class="vsn-btn-small" onclick="clearHistory()">Clear History</button>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="vsn-action-buttons">
                <div class="vsn-action-row">
                    <button class="vsn-btn-primary" onclick="runAllocateFull()">Allocate Full</button>
                    <button class="vsn-btn-primary" onclick="runAllocateSlokam()">Allocate Only Ślokam</button>
                    <button class="vsn-btn-primary" onclick="reAllocate()">ReAllocate</button>
                </div>
                <button class="vsn-btn-small" onclick="clearAllFields()">Clear All Fields</button>
            </div>

        </div>

        <!-- RIGHT COLUMN -->
        <div class="vsn-right-column">

            <!-- OUTPUT SECTION -->
            <div class="vsn-output-section">
                <label class="vsn-section-title">Here is your Allocation:</label>
                <div class="vsn-output-box">
                    <div id="vsn-output"></div>
                </div>
            </div>

            <!-- DOWNLOAD BUTTONS -->
            <div class="vsn-download-buttons">
                <button class="vsn-btn-download" onclick="copyOutput(this)">Copy Output</button>
                <button class="vsn-btn-download" onclick="exportVSNExcel()">Download Excel</button>
                <button class="vsn-btn-download" onclick="exportVSNPDF()">Download PDF</button>
            </div>

        </div>

    </div>

</div>
