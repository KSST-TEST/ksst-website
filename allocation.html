<!DOCTYPE html>
<html>
<head>
    <title>KSST Allocation Tool</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff8e6;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: auto;
        }
        textarea {
            width: 100%;
            height: 180px;
            font-size: 16px;
            padding: 10px;
        }
        .btn {
            background: #d97706;
            color: white;
            padding: 10px 18px;
            border: none;
            margin-top: 10px;
            cursor: pointer;
            font-size: 16px;
            border-radius: 6px;
        }
        .btn:hover {
            background: #b45309;
        }
        #output {
            width: 100%;
            height: 450px;
            margin-top: 20px;
            font-family: monospace;
            font-size: 16px;
            padding: 10px;
        }
        .error {
            color: red;
            font-size: 14px;
            margin-top: 4px;
        }
    </style>
</head>

<body>
<div class="container">

    <h2>KSST Allocation Tool</h2>

    <label><b>Batch Number</b></label>
    <input type="text" id="batchNumber" style="width:200px; font-size:16px;"><br><br>

    <label><b>Satsang Date</b></label>
    <input type="date" id="satsangDate" style="width:200px; font-size:16px;"><br><br>

    <label><b>Satsang Time</b></label>
    <input type="time" id="satsangTime" style="width:200px; font-size:16px;"><br><br>

    <div>
        <label><b>Main Devotee Names</b></label>
        <textarea id="mainNames"></textarea>
        <div id="mainError" class="error"></div>
    </div>

    <div>
        <label><b>Backup Devotee Names (Optional)</b></label>
        <textarea id="backupNames"></textarea>
    </div>

    <button class="btn" onclick="allocateFullVSN()">Allocate Full VSN</button>
    <button class="btn" onclick="allocate108()">Allocate 108 Slokas</button>

    <button class="btn" onclick="copyOutput()">Copy Output</button>
    <button class="btn" onclick="downloadExcel()">Download Excel</button>
    <button class="btn" onclick="downloadPDF()">Download PDF</button>

    <textarea id="output"></textarea>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
